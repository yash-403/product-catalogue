<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ action }} Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:600px">
  <h2 class="mb-4">{{ action }} Product</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Product Name *</label>
      <input type="text" name="name" class="form-control" required
             value="{{ product.Name if product else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Price (₹) *</label>
      <input type="text" name="price" class="form-control" required
             value="{{ product.Price if product else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3">{{ product.Description if product else '' }}</textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Image {% if product and product.ImageUrl %}(leave blank to keep existing){% endif %}</label>
      <input type="file" name="image" class="form-control" accept="image/*">
      {% if product and product.ImageUrl %}
      <img src="{{ product.ImageUrl }}" class="mt-2 rounded" style="max-height:120px;">
      {% endif %}
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">{{ action }} Product</button>
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
